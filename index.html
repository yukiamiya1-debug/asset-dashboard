<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, viewport-fit=cover"
  />

  <title>Asset Dashboard</title>

  <link rel="manifest" href="manifest.json" />

  <meta name="theme-color" content="#000000" />

  <link rel="apple-touch-icon" href="icon-192.png" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      padding:
        calc(env(safe-area-inset-top) + 20px)
        16px
        calc(env(safe-area-inset-bottom) + 30px);
      min-height: 100vh;
    }

    h1 {
      text-align: center;
      color: #d4af37;
      font-size: 32px;
      margin-bottom: 28px;
      letter-spacing: 1px;
    }

    .section {
      background: linear-gradient(
        180deg,
        rgba(40,40,40,0.95),
        rgba(15,15,15,0.95)
      );
      border: 1px solid rgba(212,175,55,0.25);
      border-radius: 24px;
      padding: 18px;
      margin-bottom: 18px;
      box-shadow:
        0 0 20px rgba(212,175,55,0.08),
        inset 0 1px 0 rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      cursor: pointer;
    }

    .section-title {
      font-size: 22px;
      color: #d4af37;
      font-weight: 700;
    }

    .toggle {
      font-size: 24px;
      color: #d4af37;
    }

    .section-content {
      margin-top: 16px;
      display: none;
      animation: fade 0.25s ease;
    }

    .section-content.active {
      display: block;
    }

    @keyframes fade {
      from {
        opacity: 0;
        transform: translateY(-8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .asset-card {
      background: rgba(255,255,255,0.04);
      border-radius: 18px;
      padding: 14px;
      margin-bottom: 12px;
      border: 1px solid rgba(255,255,255,0.05);
    }

    input {
      width: 100%;
      background: #111;
      border: 1px solid #333;
      border-radius: 14px;
      color: white;
      padding: 14px;
      margin-top: 10px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 10px rgba(212,175,55,0.25);
    }

    .amount {
      margin-top: 10px;
      font-size: 20px;
      color: #d4af37;
      font-weight: bold;
    }

    .sub {
      color: #999;
      font-size: 14px;
      margin-top: 4px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 16px;
      padding: 14px;
      margin-top: 12px;
      background: linear-gradient(180deg, #d4af37, #8f6b10);
      color: black;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
    }

    .total {
      background: linear-gradient(
        180deg,
        rgba(212,175,55,0.2),
        rgba(212,175,55,0.08)
      );
      border-radius: 24px;
      padding: 22px;
      margin-bottom: 24px;
      text-align: center;
      border: 1px solid rgba(212,175,55,0.3);
    }

    .total h2 {
      color: #aaa;
      margin-bottom: 10px;
      font-size: 16px;
    }

    .total-value {
      color: #d4af37;
      font-size: 36px;
      font-weight: 700;
    }
  </style>
</head>

<body>
  <h1>Asset Dashboard</h1>

  <div class="total">
    <h2>Total Assets</h2>
    <div class="total-value" id="totalAssets">¥0</div>
  </div>

  <div id="app"></div>

  <script>
    const app = document.getElementById("app");

    const state = JSON.parse(
      localStorage.getItem("asset-dashboard")
    ) || {
      bank: [],
      stock: [],
      crypto: [],
    };

    const sections = {
      bank: false,
      stock: false,
      crypto: false,
    };

    async function getUSDTJPY() {
      try {
        const res = await fetch(
          "https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=jpy"
        );

        const data = await res.json();

        return data.tether.jpy || 150;
      } catch {
        return 150;
      }
    }

    function save() {
      localStorage.setItem(
        "asset-dashboard",
        JSON.stringify(state)
      );
    }

    async function render() {
      const usdtRate = await getUSDTJPY();

      let total = 0;

      app.innerHTML = "";

      const categories = [
        ["bank", "Bank"],
        ["stock", "Stock"],
        ["crypto", "Crypto"],
      ];

      categories.forEach(([key, title]) => {
        const section = document.createElement("div");
        section.className = "section";

        const contentActive = sections[key]
          ? "active"
          : "";

        section.innerHTML = `
          <div class="section-header" onclick="toggleSection('${key}')">
            <div class="section-title">${title}</div>
            <div class="toggle">
              ${sections[key] ? "−" : "+"}
            </div>
          </div>

          <div class="section-content ${contentActive}">
            <div id="${key}-list"></div>

            <button onclick="addAsset('${key}')">
              Add ${title}
            </button>
          </div>
        `;

        app.appendChild(section);

        const list = section.querySelector(`#${key}-list`);

        state[key].forEach((item, index) => {
          let yen = Number(item.amount || 0);

          if (key === "crypto") {
            yen = yen * usdtRate;
          }

          total += yen;

          const card = document.createElement("div");

          card.className = "asset-card";

          card.innerHTML = `
            <input
              value="${item.name}"
              placeholder="Name"
              oninput="updateField('${key}', ${index}, 'name', this.value)"
            />

            <input
              value="${item.amount}"
              placeholder="${
                key === "crypto"
                  ? "USDT"
                  : "JPY"
              }"
              type="number"
              oninput="updateField('${key}', ${index}, 'amount', this.value)"
            />

            ${
              key === "crypto"
                ? `
                <div class="amount">
                  ${Number(item.amount || 0)} USDT
                </div>

                <div class="sub">
                  ≈ ¥${Math.round(yen).toLocaleString()}
                </div>
              `
                : `
                <div class="amount">
                  ¥${Math.round(yen).toLocaleString()}
                </div>
              `
            }
          `;

          list.appendChild(card);
        });
      });

      document.getElementById(
        "totalAssets"
      ).innerText =
        "¥" + Math.round(total).toLocaleString();
    }

    function toggleSection(key) {
      sections[key] = !sections[key];
      render();
    }

    function addAsset(type) {
      state[type].push({
        name: "",
        amount: "",
      });

      save();

      sections[type] = false;

      render();
    }

    function updateField(type, index, field, value) {
      state[type][index][field] = value;
      save();
    }

    render();

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register(
        "./service-worker.js"
      );
    }
  </script>
</body>
</html>
