<!-- =========================
ASSET DASHBOARD COMPLETE v3
index.html
========================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Asset Dashboard</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">

<style>

:root{
--gold:#d4af37;
--bg:#000;
--card1:#0f0f0f;
--card2:#181818;
--line:#252525;
--green:#00d26a;
--red:#ff4d4f;
--text:#fff;
--sub:#8f8f8f;
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:#fff;
padding:
calc(env(safe-area-inset-top) + 48px)
20px
140px;
overflow-x:hidden;
}

h1{
font-size:15px;
color:#999;
font-weight:500;
margin-bottom:10px;
}

.sub{
color:#777;
font-size:12px;
margin-top:8px;
}

.card{
background:
linear-gradient(
180deg,
rgba(255,255,255,.03),
rgba(255,255,255,.01)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,255,255,.06);

border-radius:28px;

padding:22px;

margin-bottom:24px;

box-shadow:
0 0 30px rgba(0,0,0,.5),
inset 0 1px 1px rgba(255,255,255,.03);

transition:.25s;
}

.card:active{
transform:scale(.99);
}

.total{
font-size:52px;
font-weight:700;
line-height:1.05;
color:var(--gold);
letter-spacing:-2px;
}

.change{
margin-top:14px;
font-size:15px;
font-weight:600;
}

.plus{
color:var(--green);
}

.minus{
color:var(--red);
}

.section-title{
font-size:24px;
font-weight:700;
margin-bottom:20px;
display:flex;
justify-content:space-between;
align-items:center;
}

.asset-item{
background:
linear-gradient(
180deg,
#161616,
#101010
);

border-radius:22px;

padding:18px;

margin-bottom:14px;

border:1px solid rgba(255,255,255,.04);

transition:.25s;
}

.asset-item:active{
transform:scale(.985);
}

.asset-top{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.asset-name{
font-size:18px;
font-weight:600;
}

.asset-value{
font-size:20px;
font-weight:700;
text-align:right;
}

.asset-yen{
font-size:13px;
color:#888;
margin-top:5px;
text-align:right;
}

.asset-detail{
display:none;
margin-top:18px;
animation:fade .25s ease;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(-5px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.asset-detail input{
width:100%;
padding:16px;
margin-bottom:12px;
border:none;
border-radius:16px;
background:#1d1d1d;
color:#fff;
font-size:16px;
outline:none;
}

button{
border:none;
border-radius:18px;
padding:16px;
font-size:15px;
font-weight:700;
cursor:pointer;
transition:.2s;
}

button:active{
transform:scale(.97);
opacity:.8;
}

.delete-btn{
background:#2b1111;
color:#ff5f5f;
margin-top:12px;
width:100%;
}

.add-btn{
width:42px;
height:42px;
border-radius:50%;
background:#191919;
color:var(--gold);
font-size:22px;
padding:0;
}

.pin-screen{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:30px;
}

.pin-title{
font-size:80px;
color:var(--gold);
margin-bottom:30px;
}

.pin-input{
width:240px;
padding:18px;
font-size:32px;
text-align:center;
letter-spacing:12px;
background:#111;
border:none;
border-radius:22px;
color:#fff;
margin-bottom:18px;
outline:none;
}

.pin-btn{
background:var(--gold);
color:#000;
width:240px;
}

.splash{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10000;
animation:fadeOut 2s forwards;
animation-delay:1.4s;
}

.splash-logo{
font-size:80px;
color:var(--gold);
font-weight:700;
}

.splash-text{
margin-top:12px;
letter-spacing:5px;
color:#777;
font-size:13px;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}

.pie-wrap{
display:flex;
align-items:center;
justify-content:center;
position:relative;
margin-top:20px;
}

.pie{
width:240px;
height:240px;
border-radius:50%;
position:relative;
transition:1s ease;
}

.pie::after{
content:'';
position:absolute;
inset:38px;
background:#000;
border-radius:50%;
box-shadow:0 0 25px rgba(0,0,0,.8);
}

.pie-center{
position:absolute;
text-align:center;
z-index:2;
}

.pie-center .small{
font-size:12px;
color:#888;
}

.pie-center .big{
font-size:28px;
font-weight:700;
color:#fff;
margin-top:5px;
}

.legend{
margin-top:30px;
display:flex;
flex-direction:column;
gap:14px;
}

.legend-item{
display:flex;
align-items:center;
justify-content:space-between;
font-size:15px;
}

.legend-left{
display:flex;
align-items:center;
gap:10px;
}

.dot{
width:12px;
height:12px;
border-radius:50%;
}

</style>
</head>

<body>

<div class="splash">
<div class="splash-logo">¥</div>
<div class="splash-text">ASSET DASHBOARD</div>
</div>

<div id="pinLock" class="pin-screen">

<div class="pin-title">¥</div>

<input
id="pinInput"
class="pin-input"
type="password"
maxlength="4"
placeholder="----"
>

<button class="pin-btn" onclick="unlock()">
ENTER
</button>

</div>

<h1>総資産</h1>

<div class="card">

<div id="totalJPY" class="total">
¥0
</div>

<div id="changeText" class="change">
0%
</div>

<div class="sub">
Realtime USDT/JPY
</div>

</div>

<div class="card">

<div class="section-title">
<span>資産割合</span>
</div>

<div class="pie-wrap">

<div class="pie" id="pieChart"></div>

<div class="pie-center">
<div class="small">総資産</div>
<div class="big" id="pieTotal">¥0</div>
</div>

</div>

<div class="legend">

<div class="legend-item">
<div class="legend-left">
<div class="dot" style="background:#d4af37"></div>
銀行
</div>
<div id="bankPercent">0%</div>
</div>

<div class="legend-item">
<div class="legend-left">
<div class="dot" style="background:#3b82f6"></div>
証券
</div>
<div id="stockPercent">0%</div>
</div>

<div class="legend-item">
<div class="legend-left">
<div class="dot" style="background:#8b5cf6"></div>
Crypto
</div>
<div id="cryptoPercent">0%</div>
</div>

</div>

</div>

<div class="card">

<div class="section-title">
<span>銀行</span>

<button
class="add-btn"
onclick="addAsset('bank')"
>
＋
</button>

</div>

<div id="bankList"></div>

</div>

<div class="card">

<div class="section-title">
<span>証券</span>

<button
class="add-btn"
onclick="addAsset('stock')"
>
＋
</button>

</div>

<div id="stockList"></div>

</div>

<div class="card">

<div class="section-title">
<span>Crypto</span>

<button
class="add-btn"
onclick="addAsset('crypto')"
>
＋
</button>

</div>

<div id="cryptoList"></div>

</div>

<script>

let usdtRate = 150;

const state =
JSON.parse(localStorage.getItem("assetData"))
||
{
bank:[],
stock:[],
crypto:[]
};

async function fetchRate(){

try{

const res = await fetch(
'https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=jpy'
);

const data = await res.json();

usdtRate = data.tether.jpy;

render();

}catch(e){
console.log(e);
}
}

function saveLocal(){

localStorage.setItem(
"assetData",
JSON.stringify(state)
);

}

function formatJPY(num){

num = Math.floor(num);

return "¥" + num.toLocaleString();

}

function calculateTotal(){

let total = 0;

state.bank.forEach(i=>{
total += Number(i.amount||0);
});

state.stock.forEach(i=>{
total += Number(i.amount||0);
});

state.crypto.forEach(i=>{
total += Number(i.amount||0) * usdtRate;
});

return total;
}

function render(){

renderSection('bank','bankList','JPY');

renderSection('stock','stockList','JPY');

renderSection('crypto','cryptoList','USDT');

const total = calculateTotal();

document.getElementById("totalJPY").innerText =
formatJPY(total);

document.getElementById("pieTotal").innerText =
formatJPY(total);

renderChange(total);

renderPie(total);

}

function renderChange(total){

const prev =
Number(localStorage.getItem("prevTotal"))
|| total;

const diff =
(((total-prev)/prev)*100).toFixed(2);

const changeEl =
document.getElementById("changeText");

if(diff >= 0){

changeEl.className = "change plus";

changeEl.innerText =
`▲ ${diff}%`;

}else{

changeEl.className = "change minus";

changeEl.innerText =
`▼ ${Math.abs(diff)}%`;

}

localStorage.setItem("prevTotal",total);
}

function renderSection(type,container,symbol){

const wrap = document.getElementById(container);

wrap.innerHTML='';

state[type].forEach((item,index)=>{

const el = document.createElement('div');

el.className='asset-item';

const value =
Number(item.amount||0);

let mainValue = '';
let subValue = '';

if(symbol === 'USDT'){

mainValue =
`${value.toLocaleString()} USDT`;

subValue =
`≈ ${formatJPY(value * usdtRate)}`;

}else{

mainValue =
formatJPY(value);

}

el.innerHTML=`

<div
class="asset-top"
onclick="toggleDetail('${type}',${index})"
>

<div>

<div class="asset-name">
${item.name || '未設定'}
</div>

${symbol==='USDT'
? `<div class="asset-yen">${subValue}</div>`
: ''
}

</div>

<div class="asset-value">
${mainValue}
</div>

</div>

<div
class="asset-detail"
id="${type}-${index}"
>

<input
placeholder="名称"
value="${item.name || ''}"
oninput="
updateField(
'${type}',
${index},
'name',
this.value
)
"
>

<input
placeholder="${symbol}"
type="number"
value="${item.amount || ''}"
oninput="
updateField(
'${type}',
${index},
'amount',
this.value
)
"
>

<button
class="delete-btn"
onclick="
deleteAsset(
'${type}',
${index}
)
"
>
削除
</button>

</div>

`;

wrap.appendChild(el);

});

}

function toggleDetail(type,index){

const el =
document.getElementById(`${type}-${index}`);

el.style.display =
el.style.display === 'block'
? 'none'
: 'block';
}

function addAsset(type){

state[type].push({
name:'',
amount:''
});

saveLocal();

render();
}

function deleteAsset(type,index){

state[type].splice(index,1);

saveLocal();

render();
}

function updateField(type,index,key,value){

state[type][index][key] = value;

saveLocal();

}

function renderPie(total){

const bank =
state.bank.reduce(
(a,b)=>a+Number(b.amount||0),
0
);

const stock =
state.stock.reduce(
(a,b)=>a+Number(b.amount||0),
0
);

const crypto =
state.crypto.reduce(
(a,b)=>a+(Number(b.amount||0)*usdtRate),
0
);

const bankP = total
? (bank/total)*100
: 0;

const stockP = total
? (stock/total)*100
: 0;

const cryptoP = total
? (crypto/total)*100
: 0;

document.getElementById("bankPercent")
.innerText = `${bankP.toFixed(1)}%`;

document.getElementById("stockPercent")
.innerText = `${stockP.toFixed(1)}%`;

document.getElementById("cryptoPercent")
.innerText = `${cryptoP.toFixed(1)}%`;

const pie =
document.getElementById("pieChart");

pie.style.background = `
conic-gradient(
#d4af37 0% ${bankP}%,
#3b82f6 ${bankP}% ${bankP+stockP}%,
#8b5cf6 ${bankP+stockP}% 100%
)
`;
}

function unlock(){

const input =
document.getElementById("pinInput").value;

let pin =
localStorage.getItem("appPin");

if(!pin){

localStorage.setItem("appPin",input);

document.getElementById("pinLock")
.style.display='none';

return;
}

if(input === pin){

document.getElementById("pinLock")
.style.display='none';

}else{

alert("PIN ERROR");

}
}

fetchRate();

render();

setInterval(fetchRate,300000);

if('serviceWorker' in navigator){

navigator.serviceWorker.register(
'./service-worker.js'
);

}

</script>

</body>
</html>
