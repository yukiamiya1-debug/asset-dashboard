<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>資産ダッシュボード</title>

  <style>

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background: #000;
      color: white;
      min-height: 100vh;
      padding: 24px;
    }

    .container {
      max-width: 480px;
      margin: 0 auto;
    }

    .card {
      background: #111;
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 28px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .label {
      color: #777;
      font-size: 14px;
      margin-bottom: 10px;
    }

    .total {
      font-size: 52px;
      font-weight: 700;
      letter-spacing: -2px;
    }

    .percent {
      margin-top: 10px;
      font-size: 16px;
      font-weight: 700;
    }

    .percent-up {
      color: #00c853;
    }

    .percent-down {
      color: #ff5252;
    }

    .asset-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 18px 0;
    }

    .asset-title {
      color: #999;
      font-size: 18px;
    }

    .asset-value {
      font-size: 22px;
      font-weight: 700;
    }

    .crypto-sub {
      text-align: right;
      color: #666;
      font-size: 13px;
      margin-top: -10px;
    }

    .detail-card {
      background: #171717;
      border-radius: 18px;
      padding: 16px;
      margin-top: 12px;
    }

    .detail-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .small-button {
      background: #222;
      color: white;
      border: none;
      border-radius: 12px;
      padding: 8px 12px;
      font-size: 12px;
      cursor: pointer;
    }

    input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid rgba(255,255,255,0.05);
      color: white;
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
      font-size: 16px;
      outline: none;
    }

    input:focus {
      border-color: rgba(255,255,255,0.18);
    }

    .edit-button {
      width: 100%;
      background: white;
      color: black;
      border: none;
      border-radius: 18px;
      padding: 18px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .edit-section {
      display: none;
      margin-top: 20px;
    }

    .updated {
      color: #666;
      text-align: center;
      margin-top: 18px;
      font-size: 12px;
    }

  </style>
</head>

<body>

<div class="container">

  <div class="card">

    <div class="label">総資産</div>

    <div class="total" id="totalJPY">
      ¥0
    </div>

    <div class="percent percent-up" id="changePercent">
      +0%
    </div>

  </div>

  <div class="card">

    <div class="asset-row" id="bankToggle" style="cursor:pointer;">
      <div class="asset-title">銀行</div>
      <div class="asset-value" id="bankTotal">¥0</div>
    </div>

    <div id="bankDetails" style="display:none;"></div>

    <div class="asset-row" id="stockToggle" style="cursor:pointer;">
      <div class="asset-title">証券</div>
      <div class="asset-value" id="stockTotal">¥0</div>
    </div>

    <div id="stockDetails" style="display:none;"></div>

    <div class="asset-row" style="padding-bottom:6px;">
      <div class="asset-title">Crypto</div>
      <div class="asset-value" id="cryptoDisplay">
        0 USDT
      </div>
    </div>

    <div class="crypto-sub" id="cryptoJPY">
      ¥0
    </div>

  </div>

  <div class="card">

    <button class="edit-button" onclick="toggleEdit()">
      編集
    </button>

    <div class="edit-section" id="editSection">

      <input
        type="text"
        id="bankName"
        placeholder="銀行名"
      />

      <input
        type="number"
        id="bankAmount"
        placeholder="預金額"
      />

      <button class="edit-button" onclick="addBank()">
        銀行追加
      </button>

      <br><br>

      <input
        type="text"
        id="stockName"
        placeholder="証券会社名"
      />

      <input
        type="number"
        id="stockAmount"
        placeholder="証券資産"
      />

      <button class="edit-button" onclick="addStock()">
        証券追加
      </button>

      <br><br>

      <input
        type="number"
        id="cryptoInput"
        placeholder="Crypto (USDT)"
      />

      <button class="edit-button" onclick="saveCrypto()">
        保存
      </button>

    </div>

    <div class="updated" id="updated"></div>

  </div>

</div>

<script>

function formatJPY(value) {
  return '¥' + Number(value).toLocaleString('ja-JP');
}

function toggleEdit() {
  const section = document.getElementById('editSection');
  section.style.display =
    section.style.display === 'block' ? 'none' : 'block';
}

function toggleBanks() {
  const details = document.getElementById('bankDetails');
  details.style.display =
    details.style.display === 'block' ? 'none' : 'block';
}

function toggleStocks() {
  const details = document.getElementById('stockDetails');
  details.style.display =
    details.style.display === 'block' ? 'none' : 'block';
}

function getBanks() {
  return JSON.parse(localStorage.getItem('banks') || '[]');
}

function saveBanks(banks) {
  localStorage.setItem('banks', JSON.stringify(banks));
}

function getStocks() {
  return JSON.parse(localStorage.getItem('stocks') || '[]');
}

function saveStocks(stocks) {
  localStorage.setItem('stocks', JSON.stringify(stocks));
}

function addBank() {
  const name = document.getElementById('bankName').value;
  const amount = document.getElementById('bankAmount').value;

  if (!name || !amount) {
    alert('銀行情報を入力してください');
    return;
  }

  const banks = getBanks();

  banks.push({
    name,
    amount: Number(amount)
  });

  saveBanks(banks);

  document.getElementById('bankName').value = '';
  document.getElementById('bankAmount').value = '';

  render();
}

function addStock() {
  const name = document.getElementById('stockName').value;
  const amount = document.getElementById('stockAmount').value;

  if (!name || !amount) {
    alert('証券情報を入力してください');
    return;
  }

  const stocks = getStocks();

  stocks.push({
    name,
    amount: Number(amount)
  });

  saveStocks(stocks);

  document.getElementById('stockName').value = '';
  document.getElementById('stockAmount').value = '';

  render();
}

function deleteBank(index) {
  const banks = getBanks();
  banks.splice(index, 1);
  saveBanks(banks);
  render();
}

function deleteStock(index) {
  const stocks = getStocks();
  stocks.splice(index, 1);
  saveStocks(stocks);
  render();
}

function updateBankName(index, value) {
  const banks = getBanks();
  banks[index].name = value;
  saveBanks(banks);
  render();
}

function updateBankAmount(index, value) {
  const banks = getBanks();
  banks[index].amount = Number(value);
  saveBanks(banks);
  render();
}

function updateStockName(index, value) {
  const stocks = getStocks();
  stocks[index].name = value;
  saveStocks(stocks);
  render();
}

function updateStockAmount(index, value) {
  const stocks = getStocks();
  stocks[index].amount = Number(value);
  saveStocks(stocks);
  render();
}

function saveCrypto() {

  const currentTotal =
    Number(
      document
        .getElementById('totalJPY')
        .innerText
        .replace(/[¥,]/g, '')
    );

  localStorage.setItem('previousTotal', currentTotal);

  localStorage.setItem(
    'crypto',
    document.getElementById('cryptoInput').value || 0
  );

  localStorage.setItem(
    'updated',
    new Date().toLocaleString('ja-JP')
  );

  render();

  alert('保存しました');
}

async function fetchUSDTJPY() {

  try {

    const response = await fetch(
      'https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=jpy'
    );

    const data = await response.json();

    return data.tether.jpy;

  } catch {

    return 156;
  }
}

async function render() {

  const rate = await fetchUSDTJPY();

  const banks = getBanks();
  const stocks = getStocks();

  let bankTotal = 0;
  let stockTotal = 0;

  const bankDetails =
    document.getElementById('bankDetails');

  bankDetails.innerHTML = '';

  banks.forEach((bank, index) => {

    bankTotal += Number(bank.amount);

    bankDetails.innerHTML += `
      <div class="detail-card">

        <div class="detail-top">

          <div style="font-size:14px; color:#777;">
            銀行 ${index + 1}
          </div>

          <button
            class="small-button"
            onclick="deleteBank(${index})"
          >
            削除
          </button>

        </div>

        <input
          value="${bank.name}"
          onchange="updateBankName(${index}, this.value)"
        />

        <input
          type="number"
          value="${bank.amount}"
          onchange="updateBankAmount(${index}, this.value)"
        />

      </div>
    `;
  });

  const stockDetails =
    document.getElementById('stockDetails');

  stockDetails.innerHTML = '';

  stocks.forEach((stock, index) => {

    stockTotal += Number(stock.amount);

    stockDetails.innerHTML += `
      <div class="detail-card">

        <div class="detail-top">

          <div style="font-size:14px; color:#777;">
            証券 ${index + 1}
          </div>

          <button
            class="small-button"
            onclick="deleteStock(${index})"
          >
            削除
          </button>

        </div>

        <input
          value="${stock.name}"
          onchange="updateStockName(${index}, this.value)"
        />

        <input
          type="number"
          value="${stock.amount}"
          onchange="updateStockAmount(${index}, this.value)"
        />

      </div>
    `;
  });

  const crypto =
    Number(localStorage.getItem('crypto')) || 0;

  const cryptoJPY = crypto * rate;

  const total =
    bankTotal +
    stockTotal +
    cryptoJPY;

  document.getElementById('totalJPY').innerText =
    formatJPY(Math.round(total));

  document.getElementById('bankTotal').innerText =
    formatJPY(bankTotal);

  document.getElementById('stockTotal').innerText =
    formatJPY(stockTotal);

  document.getElementById('cryptoDisplay').innerText =
    crypto.toLocaleString('ja-JP') + ' USDT';

  document.getElementById('cryptoJPY').innerText =
    formatJPY(Math.round(cryptoJPY));

  document.getElementById('cryptoInput').value =
    crypto || '';

  const previousTotal =
    Number(localStorage.getItem('previousTotal'))
    || total;

  const percent =
    ((total - previousTotal) / previousTotal) * 100;

  const percentElement =
    document.getElementById('changePercent');

  percentElement.innerText =
    (percent >= 0 ? '+' : '') +
    percent.toFixed(2) +
    '%';

  percentElement.className =
    percent >= 0
      ? 'percent percent-up'
      : 'percent percent-down';

  const updated =
    localStorage.getItem('updated');

  if (updated) {
    document.getElementById('updated').innerText =
      '最終更新: ' + updated;
  }
}

document
  .getElementById('bankToggle')
  .addEventListener('click', toggleBanks);

document
  .getElementById('stockToggle')
  .addEventListener('click', toggleStocks);

render();

</script>

</body>
</html>
