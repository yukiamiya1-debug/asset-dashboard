<!-- =========================
ASSET DASHBOARD COMPLETE v1
index.html
========================= -->
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">

<title>Asset Dashboard</title>

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#000000">

<link rel="manifest" href="manifest.json">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
background:#000;
color:#fff;
padding:20px;
padding-bottom:120px;
}

h1{
font-size:32px;
margin-bottom:6px;
}

.sub{
color:#888;
font-size:13px;
margin-bottom:25px;
}

.card{
background:#111;
border:1px solid #222;
border-radius:20px;
padding:18px;
margin-bottom:18px;
}

.total{
font-size:42px;
font-weight:700;
margin-top:10px;
color:#d4af37;
}

.change{
margin-top:8px;
font-size:14px;
font-weight:600;
}

.plus{
color:#00c853;
}

.minus{
color:#ff5252;
}

.section-title{
font-size:20px;
margin-bottom:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.asset-item{
background:#181818;
border-radius:14px;
padding:14px;
margin-bottom:10px;
}

.asset-top{
display:flex;
justify-content:space-between;
align-items:center;
cursor:pointer;
}

.asset-name{
font-size:17px;
font-weight:600;
}

.asset-value{
font-size:17px;
font-weight:700;
}

.asset-detail{
display:none;
margin-top:15px;
}

.asset-detail input{
width:100%;
padding:12px;
margin-bottom:10px;
border:none;
border-radius:10px;
background:#222;
color:#fff;
font-size:15px;
}

button{
border:none;
border-radius:12px;
padding:12px 14px;
font-size:14px;
font-weight:600;
cursor:pointer;
}

.save-btn{
background:#d4af37;
color:#000;
width:100%;
}

.delete-btn{
background:#ff5252;
color:#fff;
margin-top:10px;
width:100%;
}

.add-btn{
background:#222;
color:#d4af37;
}

.graph-box{
height:220px;
display:flex;
align-items:flex-end;
gap:8px;
margin-top:20px;
}

.bar{
flex:1;
background:#d4af37;
border-radius:8px 8px 0 0;
opacity:.85;
}

.pin-screen{
position:fixed;
inset:0;
background:#000;
z-index:9999;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
padding:30px;
}

.pin-title{
font-size:32px;
color:#d4af37;
margin-bottom:25px;
}

.pin-input{
width:220px;
padding:18px;
font-size:28px;
text-align:center;
letter-spacing:10px;
background:#111;
border:none;
border-radius:16px;
color:#fff;
margin-bottom:15px;
}

.pin-btn{
background:#d4af37;
color:#000;
width:220px;
}

.splash{
position:fixed;
inset:0;
background:#000;
display:flex;
align-items:center;
justify-content:center;
flex-direction:column;
z-index:10000;
animation:fadeOut 2s forwards;
animation-delay:1.5s;
}

.splash-logo{
font-size:70px;
color:#d4af37;
font-weight:700;
}

.splash-text{
margin-top:10px;
letter-spacing:4px;
color:#999;
}

@keyframes fadeOut{
to{
opacity:0;
visibility:hidden;
}
}
</style>
</head>

<body>

<div class="splash">
<div class="splash-logo">¥</div>
<div class="splash-text">ASSET DASHBOARD</div>
</div>

<div id="pinLock" class="pin-screen">
<div class="pin-title">¥</div>
<input id="pinInput" class="pin-input" type="password" maxlength="4" placeholder="----">
<button class="pin-btn" onclick="unlock()">ENTER</button>
</div>

<h1>総資産</h1>
<div class="sub">Realtime USDT/JPY</div>

<div class="card">
<div id="totalJPY" class="total">¥0</div>
<div id="changeText" class="change">0%</div>
</div>

<div class="card">
<div class="section-title">
<span>資産推移</span>
</div>

<div class="graph-box" id="graphBox"></div>
</div>

<div class="card">
<div class="section-title">
<span>銀行</span>
<button class="add-btn" onclick="addAsset('bank')">＋</button>
</div>
<div id="bankList"></div>
</div>

<div class="card">
<div class="section-title">
<span>証券</span>
<button class="add-btn" onclick="addAsset('stock')">＋</button>
</div>
<div id="stockList"></div>
</div>

<div class="card">
<div class="section-title">
<span>Crypto</span>
<button class="add-btn" onclick="addAsset('crypto')">＋</button>
</div>
<div id="cryptoList"></div>
</div>

<script>
let usdtRate = 150;

const state = JSON.parse(localStorage.getItem("assetData")) || {
bank:[],
stock:[],
crypto:[]
};

const historyData = JSON.parse(localStorage.getItem("assetHistory")) || [];

async function fetchRate(){
try{
const res = await fetch(
'https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=jpy'
);
const data = await res.json();
usdtRate = data.tether.jpy;
render();
}catch(e){
console.log(e);
}
}

function saveState(){
localStorage.setItem("assetData",JSON.stringify(state));

const total = calculateTotal();

historyData.push({
date:Date.now(),
total
});

if(historyData.length > 30){
historyData.shift();
}

localStorage.setItem("assetHistory",JSON.stringify(historyData));

localStorage.setItem("lastTotal",total);

render();
}

function calculateTotal(){
let total = 0;

state.bank.forEach(i=> total += Number(i.amount||0));
state.stock.forEach(i=> total += Number(i.amount||0));
state.crypto.forEach(i=> total += Number(i.amount||0) * usdtRate);

return total;
}

function render(){

renderSection('bank','bankList','¥');
renderSection('stock','stockList','¥');
renderSection('crypto','cryptoList','USDT');

const total = calculateTotal();

document.getElementById("totalJPY").innerText =
"¥" + total.toLocaleString();

const prev = Number(localStorage.getItem("prevTotal")) || total;

const diff = ((total-prev)/prev*100).toFixed(2);

const changeEl = document.getElementById("changeText");

if(diff >=0){
changeEl.className="change plus";
changeEl.innerText=`▲ ${diff}%`;
}else{
changeEl.className="change minus";
changeEl.innerText=`▼ ${diff}%`;
}

localStorage.setItem("prevTotal",total);

renderGraph();
}

function renderSection(type,container,symbol){

const wrap = document.getElementById(container);
wrap.innerHTML='';

state[type].forEach((item,index)=>{

const el = document.createElement('div');
el.className='asset-item';

el.innerHTML=`
<div class="asset-top" onclick="toggleDetail('${type}',${index})">
<div class="asset-name">${item.name || '未設定'}</div>
<div class="asset-value">
${symbol}${Number(item.amount||0).toLocaleString()}
</div>
</div>

<div class="asset-detail" id="${type}-${index}">
<input placeholder="名称"
value="${item.name || ''}"
oninput="updateField('${type}',${index},'name',this.value)">

<input placeholder="${symbol==='USDT'?'USDT':'JPY'}"
type="number"
value="${item.amount || ''}"
oninput="updateField('${type}',${index},'amount',this.value)">

<button class="save-btn" onclick="saveState()">保存</button>

<button class="delete-btn"
onclick="deleteAsset('${type}',${index})">
削除
</button>
</div>
`;

wrap.appendChild(el);
});
}

function toggleDetail(type,index){
const el = document.getElementById(`${type}-${index}`);
el.style.display =
el.style.display === 'block'
? 'none'
: 'block';
}

function addAsset(type){
state[type].push({
name:'',
amount:''
});

saveState();
}

function deleteAsset(type,index){
state[type].splice(index,1);
saveState();
}

function updateField(type,index,key,value){
state[type][index][key]=value;
}

function renderGraph(){

const graph = document.getElementById("graphBox");

graph.innerHTML='';

const max = Math.max(...historyData.map(i=>i.total),1);

historyData.forEach(i=>{

const h = (i.total/max)*180;

const bar = document.createElement('div');

bar.className='bar';

bar.style.height = h+'px';

graph.appendChild(bar);

});
}

function unlock(){

const input = document.getElementById("pinInput").value;

let pin = localStorage.getItem("appPin");

if(!pin){
localStorage.setItem("appPin",input);
document.getElementById("pinLock").style.display='none';
return;
}

if(input === pin){
document.getElementById("pinLock").style.display='none';
}else{
alert("PIN ERROR");
}
}

fetchRate();
render();

setInterval(fetchRate,300000);

if('serviceWorker' in navigator){
navigator.serviceWorker.register('./service-worker.js');
}
</script>

</body>
</html>
