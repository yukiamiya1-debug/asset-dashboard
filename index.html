<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Asset Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Asset Dashboard" />
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --green:      #3ec98e;        /* Moneytree メインの黄緑 */
  --green-dark: #2aad74;        /* 押下・アクセント濃い */
  --green-dim:  rgba(62,201,142,0.15);
  --green-glow: rgba(62,201,142,0.3);
  --bg:         #f2f5f3;        /* 白に緑を微かに含んだ背景 */
  --surface:    #ffffff;        /* カード白 */
  --surface2:   #eef3f0;        /* 薄い緑みがかった背景 */
  --border:     rgba(0,0,0,0.07);
  --text:       #1a2e25;        /* 濃い緑がかった黒 */
  --muted:      #7a9488;        /* くすんだグリーングレー */
  --sub:        #a8bdb5;
  --tab-h: 72px;
  --safe-b: env(safe-area-inset-bottom, 0px);
  --safe-t: env(safe-area-inset-top, 0px);
}

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif;
  overflow-x: hidden;
}

/* ── Tab Nav ── */
.tab-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: calc(var(--tab-h) + var(--safe-b));
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: flex-start;
  padding-top: 8px;
  padding-bottom: var(--safe-b);
  z-index: 100;
}
.tab-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 6px 2px;
  opacity: 0.35;
  transition: opacity 0.2s;
}
.tab-item.active { opacity: 1; }
.tab-item:active { opacity: 0.55; }
.tab-icon { font-size: 21px; line-height: 1; }
.tab-label {
  font-size: 9px;
  letter-spacing: 1px;
  color: var(--muted);
  font-weight: 600;
  text-transform: uppercase;
}
.tab-item.active .tab-label { color: var(--green-dark); }
.tab-item.active .tab-icon  { filter: drop-shadow(0 0 5px var(--green-glow)); }

/* ── Pages ── */
.page {
  display: none;
  min-height: 100vh;
  padding: calc(var(--safe-t) + 24px) 18px calc(var(--tab-h) + var(--safe-b) + 24px);
  animation: fadeUp 0.38s ease;
}
.page.active { display: block; }
@keyframes fadeUp {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.container { max-width: 520px; margin: 0 auto; }

/* ── Page Header ── */
.page-header { margin-bottom: 26px; }
.page-logo {
  font-size: 36px;
  font-weight: 800;
  color: var(--green);
  line-height: 1;
}
.page-subtitle {
  font-size: 10px;
  letter-spacing: 5px;
  color: var(--muted);
  margin-top: 6px;
  font-weight: 600;
}

/* ── Total Card（グリーングラデーション） ── */
.total-card {
  background: linear-gradient(140deg, #3ec98e 0%, #2aad74 100%);
  border-radius: 26px;
  padding: 28px 26px;
  margin-bottom: 18px;
  box-shadow: 0 8px 32px rgba(62,201,142,0.28);
  color: #fff;
}
.total-label {
  font-size: 10px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 3px;
  font-weight: 700;
  margin-bottom: 10px;
}
.total-value {
  font-size: 40px;
  font-weight: 800;
  letter-spacing: -1px;
  color: #fff;
}
.total-sub { font-size: 12px; color: rgba(255,255,255,0.65); margin-top: 6px; }

/* ── Chart ── */
.chart-wrap {
  background: var(--surface);
  border-radius: 24px;
  padding: 20px;
  margin-bottom: 18px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 12px rgba(0,0,0,0.05);
}
.chart-wrap canvas { max-height: 190px; }

/* ── Summary Grid ── */
.summary-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 11px;
  margin-bottom: 18px;
}
.summary-item {
  background: var(--surface);
  border-radius: 20px;
  padding: 18px 16px;
  border: 1px solid var(--border);
  cursor: pointer;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  transition: box-shadow 0.2s, transform 0.15s;
}
.summary-item:active { box-shadow: 0 1px 4px rgba(0,0,0,0.06); transform: scale(0.97); }
.s-icon { font-size: 20px; margin-bottom: 8px; }
.s-label {
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 6px;
}
.s-value { font-size: 17px; font-weight: 800; color: var(--text); }

/* ── Asset Card ── */
.asset-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.asset-card-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 10px;
}
.name-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid rgba(0,0,0,0.1);
  padding: 4px 0;
  color: var(--text);
  font-size: 15px;
  font-weight: 600;
  outline: none;
  font-family: inherit;
  transition: border-color 0.2s;
}
.name-input:focus { border-bottom-color: var(--green); }
.name-input::placeholder { color: #c5d4cc; }

.delete-btn {
  background: none;
  border: none;
  color: #c5d4cc;
  font-size: 20px;
  cursor: pointer;
  padding: 0 4px;
  line-height: 1;
  transition: color 0.2s;
  flex-shrink: 0;
}
.delete-btn:active { color: #e05252; }

.input-row {
  display: flex;
  align-items: center;
  background: var(--surface2);
  border-radius: 12px;
  padding: 10px 14px;
  border: 1px solid transparent;
  transition: border-color 0.2s;
}
.input-row:focus-within { border-color: var(--green); }
.input-prefix { font-size: 13px; color: var(--muted); margin-right: 6px; flex-shrink: 0; }
.amount-input {
  flex: 1;
  background: transparent;
  border: none;
  color: var(--text);
  font-size: 17px;
  font-weight: 700;
  outline: none;
  font-family: inherit;
  min-width: 0;
}
.amount-input::placeholder { color: #c5d4cc; }
.computed-jpy { font-size: 11px; color: var(--muted); margin-top: 7px; padding-left: 2px; }

/* ── Crypto symbol select ── */
.symbol-row { display: flex; gap: 8px; margin-bottom: 8px; }
.mini-select {
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: 12px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-weight: 700;
  outline: none;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s;
  cursor: pointer;
}
.mini-select:focus { border-color: var(--green); }
.mini-select option { background: #fff; color: #1a2e25; }

/* ── Add button ── */
.add-btn {
  width: 100%;
  border: 1.5px dashed rgba(62,201,142,0.45);
  border-radius: 16px;
  padding: 14px;
  margin-top: 4px;
  font-size: 13px;
  font-weight: 700;
  background: transparent;
  color: var(--green-dark);
  cursor: pointer;
  letter-spacing: 2px;
  font-family: inherit;
  transition: background 0.2s, transform 0.1s;
}
.add-btn:active { background: var(--green-dim); transform: scale(0.99); }

/* ── Subscription ── */
.sub-total-bar {
  background: var(--surface);
  border-radius: 22px;
  padding: 18px 20px;
  margin-bottom: 18px;
  border: 1px solid var(--border);
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.stb-label { font-size: 10px; color: var(--muted); letter-spacing: 2px; font-weight: 700; }
.stb-value { font-size: 24px; font-weight: 800; margin-top: 4px; color: var(--text); }
.stb-year  { font-size: 13px; color: var(--muted); margin-top: 4px; text-align: right; }

.sub-card {
  background: var(--surface);
  border-radius: 18px;
  padding: 14px;
  margin-bottom: 10px;
  border: 1px solid var(--border);
  box-shadow: 0 1px 6px rgba(0,0,0,0.04);
}
.sub-card-top { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
.sub-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.sub-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.sub-field label {
  display: block;
  font-size: 9px;
  letter-spacing: 2px;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 4px;
}
.sub-cycle-sel {
  width: 100%;
  background: var(--surface2);
  border: 1px solid transparent;
  border-radius: 12px;
  padding: 10px 12px;
  color: var(--text);
  font-size: 14px;
  font-weight: 600;
  outline: none;
  font-family: inherit;
  -webkit-appearance: none;
  appearance: none;
  transition: border-color 0.2s;
}
.sub-cycle-sel:focus { border-color: var(--green); }
.sub-cycle-sel option { background: #fff; color: #1a2e25; }

.empty-state {
  text-align: center;
  padding: 32px 20px;
  color: var(--muted);
  font-size: 13px;
  letter-spacing: 1px;
  line-height: 2;
}
</style>
</head>
<body>

<!-- HOME -->
<div class="page active" id="page-home">
  <div class="container">
    <div class="page-header">
      <div class="page-logo">¥</div>
      <div class="page-subtitle">ASSET DASHBOARD</div>
    </div>
    <div class="total-card">
      <div class="total-label">TOTAL ASSETS</div>
      <div class="total-value" id="home-total">¥0</div>
      <div class="total-sub" id="home-sub-info">—</div>
    </div>
    <div class="chart-wrap">
      <canvas id="homeChart"></canvas>
    </div>
    <div class="summary-grid">
      <div class="summary-item" onclick="goTo('bank')">
        <div class="s-icon">🏦</div>
        <div class="s-label">BANK</div>
        <div class="s-value" id="home-bank">¥0</div>
      </div>
      <div class="summary-item" onclick="goTo('stock')">
        <div class="s-icon">📈</div>
        <div class="s-label">STOCK</div>
        <div class="s-value" id="home-stock">¥0</div>
      </div>
      <div class="summary-item" onclick="goTo('crypto')">
        <div class="s-icon">₿</div>
        <div class="s-label">CRYPTO</div>
        <div class="s-value" id="home-crypto">¥0</div>
      </div>
      <div class="summary-item" onclick="goTo('sub')">
        <div class="s-icon">🔄</div>
        <div class="s-label">SUBSCRIPTIONS</div>
        <div class="s-value" id="home-sub-val">¥0<span style="font-size:10px;color:#a8bdb5;font-weight:500">/月</span></div>
      </div>
    </div>
  </div>
</div>

<!-- BANK -->
<div class="page" id="page-bank">
  <div class="container">
    <div class="page-header">
      <div class="page-logo">🏦</div>
      <div class="page-subtitle">BANK ACCOUNTS</div>
    </div>
    <div class="total-card">
      <div class="total-label">BANK TOTAL</div>
      <div class="total-value" id="bank-total">¥0</div>
    </div>
    <div id="bank-list"></div>
  </div>
</div>

<!-- STOCK -->
<div class="page" id="page-stock">
  <div class="container">
    <div class="page-header">
      <div class="page-logo">📈</div>
      <div class="page-subtitle">STOCK &amp; FUND</div>
    </div>
    <div class="total-card">
      <div class="total-label">STOCK TOTAL</div>
      <div class="total-value" id="stock-total">¥0</div>
    </div>
    <div id="stock-list"></div>
  </div>
</div>

<!-- CRYPTO -->
<div class="page" id="page-crypto">
  <div class="container">
    <div class="page-header">
      <div class="page-logo">₿</div>
      <div class="page-subtitle">CRYPTO ASSETS</div>
    </div>
    <div class="total-card">
      <div class="total-label">CRYPTO TOTAL</div>
      <div class="total-value" id="crypto-total">¥0</div>
      <div class="total-sub" id="crypto-rate">レート取得中…</div>
    </div>
    <div id="crypto-list"></div>
  </div>
</div>

<!-- SUBSCRIPTION -->
<div class="page" id="page-sub">
  <div class="container">
    <div class="page-header">
      <div class="page-logo">🔄</div>
      <div class="page-subtitle">SUBSCRIPTIONS</div>
    </div>
    <div class="sub-total-bar">
      <div>
        <div class="stb-label">MONTHLY</div>
        <div class="stb-value" id="sub-monthly">¥0</div>
      </div>
      <div>
        <div class="stb-label" style="text-align:right">ANNUAL</div>
        <div class="stb-year" id="sub-annual">¥0 / 年</div>
      </div>
    </div>
    <div class="chart-wrap" style="margin-bottom:18px">
      <canvas id="subChart"></canvas>
    </div>
    <div id="sub-list"></div>
    <button class="add-btn" onclick="addSub()">＋ サブスク追加</button>
  </div>
</div>

<!-- Tab Nav -->
<nav class="tab-nav">
  <div class="tab-item active" id="tab-home" onclick="goTo('home')">
    <span class="tab-icon">⌂</span>
    <span class="tab-label">ホーム</span>
  </div>
  <div class="tab-item" id="tab-bank" onclick="goTo('bank')">
    <span class="tab-icon">🏦</span>
    <span class="tab-label">銀行</span>
  </div>
  <div class="tab-item" id="tab-stock" onclick="goTo('stock')">
    <span class="tab-icon">📈</span>
    <span class="tab-label">証券</span>
  </div>
  <div class="tab-item" id="tab-crypto" onclick="goTo('crypto')">
    <span class="tab-icon">₿</span>
    <span class="tab-label">暗号資産</span>
  </div>
  <div class="tab-item" id="tab-sub" onclick="goTo('sub')">
    <span class="tab-icon">🔄</span>
    <span class="tab-label">サブスク</span>
  </div>
</nav>

<script>
const STORAGE_KEY = "asset-dashboard-v2";
let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { bank:[], stock:[], crypto:[], sub:[] };

const CRYPTO_IDS = {
  BTC:"bitcoin", USDT:"tether"
};
let prices = { BTC:10000000, USDT:150 };

const SUB_COLORS = ["#d4af37","#4a9eff","#ff6b6b","#50fa7b","#bd93f9","#ffb86c","#8be9fd","#ff79c6","#a8e6cf","#ffd3b6"];

let currentPage = "home";
let homeChart, subChart;

// ── Navigation ──
function goTo(page) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.querySelectorAll(".tab-item").forEach(t => t.classList.remove("active"));
  document.getElementById("page-" + page).classList.add("active");
  document.getElementById("tab-"  + page).classList.add("active");
  currentPage = page;
  render();
}

function saveOnly() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}
function save() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  render();
}

// ── Render dispatcher ──
function render() {
  if (currentPage === "home")   renderHome();
  if (currentPage === "bank")   renderList("bank",  false);
  if (currentPage === "stock")  renderList("stock", false);
  if (currentPage === "crypto") renderCrypto();
  if (currentPage === "sub")    renderSub();
}

// ── Format ──
function yen(n) { return "¥" + Math.round(+n||0).toLocaleString("ja-JP"); }
function esc(s) { return String(s||"").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;"); }

// ── HOME ──
function bankTotal()   { return state.bank.reduce((a,b)=>a+(+b.amount||0),0); }
function stockTotal()  { return state.stock.reduce((a,b)=>a+(+b.amount||0),0); }
function cryptoTotal() { return state.crypto.reduce((a,b)=>a+(+b.amount||0)*(prices[b.symbol]||150),0); }
function subMonthly()  { return state.sub.reduce((a,b)=>{const m=b.cycle==="year"?(+b.amount/12):(+b.amount||0);return a+m;},0); }

function renderHome() {
  const bank=bankTotal(), stock=stockTotal(), crypto=cryptoTotal(), total=bank+stock+crypto, subMo=subMonthly();
  document.getElementById("home-total").textContent = yen(total);
  document.getElementById("home-sub-info").textContent = "サブスク月額 " + yen(subMo);
  document.getElementById("home-bank").textContent  = yen(bank);
  document.getElementById("home-stock").textContent = yen(stock);
  document.getElementById("home-crypto").textContent= yen(crypto);
  document.getElementById("home-sub-val").innerHTML = yen(subMo)+'<span style="font-size:10px;color:#a8bdb5;font-weight:500">/月</span>';

  const ctx = document.getElementById("homeChart");
  if (homeChart) homeChart.destroy();
  homeChart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["銀行","証券","暗号資産"],
      datasets: [{ data:[bank,stock,crypto], backgroundColor:["#3ec98e","#4a9eff","#f5a623"], borderWidth:0, hoverOffset:8 }]
    },
    options: { cutout:"68%", plugins:{ legend:{ labels:{ color:"#7a9488", font:{size:12}, padding:16 } } } }
  });
}

// ── Generic list (bank / stock) ──
function renderList(type, isCrypto) {
  const totalId = type+"-total";
  const listId  = type+"-list";
  const label   = type==="bank"?"口座":"銘柄";

  const total = isCrypto ? cryptoTotal() : state[type].reduce((a,b)=>a+(+b.amount||0),0);
  document.getElementById(totalId).textContent = yen(total);

  const listEl = document.getElementById(listId);
  if (state[type].length === 0) {
    listEl.innerHTML = `<div class="empty-state">まだデータがありません<br>下の＋ボタンから${label}を追加してください</div>`;
  } else {
    listEl.innerHTML = state[type].map((item,i)=>buildAssetCard(type,item,i,isCrypto)).join("");
  }
  listEl.innerHTML += `<button class="add-btn" onclick="addAsset('${type}')">＋ ${label}を追加</button>`;
}

function buildAssetCard(type, item, i, isCrypto) {
  const jpy = isCrypto ? (+item.amount||0)*(prices[item.symbol]||150) : (+item.amount||0);
  const symOpts = isCrypto ? Object.keys(CRYPTO_IDS).map(s=>
    `<option value="${s}"${item.symbol===s?" selected":""}>${s}</option>`
  ).join("") : "";

  return `<div class="asset-card">
    <div class="asset-card-top">
      <input class="name-input" type="text" placeholder="名称" value="${esc(item.name)}"
        oninput="updateName('${type}',${i},this.value)"
        onblur="saveOnly()">
      <button class="delete-btn" onclick="delAsset('${type}',${i})">×</button>
    </div>
    ${isCrypto ? `
      <div class="symbol-row">
        <select class="mini-select" style="flex:0 0 100px" onchange="updateProp('${type}',${i},'symbol',this.value)">${symOpts}</select>
        <div class="input-row" style="flex:1">
          <input class="amount-input" type="number" inputmode="decimal" placeholder="0" value="${item.amount||''}"
            oninput="updateAmount('${type}',${i},this.value)"
            onblur="saveOnly()">
        </div>
      </div>
      <div class="computed-jpy" id="jpy-${type}-${i}">≈ ${yen(jpy)}（1${item.symbol||'USDT'} = ${yen(prices[item.symbol]||150)}）</div>
    ` : `
      <div class="input-row">
        <span class="input-prefix">¥</span>
        <input class="amount-input" type="number" inputmode="decimal" placeholder="0" value="${item.amount||''}"
          oninput="updateAmount('${type}',${i},this.value)"
          onblur="saveOnly()">
      </div>
    `}
  </div>`;
}

// ── CRYPTO page ──
function renderCrypto() {
  const rateStr = Object.keys(CRYPTO_IDS).map(s=>`${s} ${yen(prices[s])}`).join("  ·  ");
  document.getElementById("crypto-rate").textContent = rateStr;
  renderList("crypto", true);
}

// ── Asset CRUD ──
function addAsset(type) {
  state[type].push({ name:"", amount:0, symbol:"USDT" });
  save();
}
// テキスト入力中はDOMを再構築しない（キーボードが閉じないように）
function updateName(type, i, val) {
  state[type][i].name = val;
  // saveOnly() は onblur で呼ぶ
}
// 金額入力：合計表示だけ部分更新
function updateAmount(type, i, val) {
  state[type][i].amount = +val;
  updateTotalDisplay(type);
  // saveOnly() は onblur で呼ぶ
}
function updateProp(type, i, prop, val) {
  state[type][i][prop] = prop==="amount" ? +val : val;
  save();
}
// 合計ラベルだけ書き換え（DOM再構築なし）
function updateTotalDisplay(type) {
  const isCrypto = type === "crypto";
  const total = isCrypto ? cryptoTotal() : state[type].reduce((a,b)=>a+(+b.amount||0),0);
  const el = document.getElementById(type+"-total");
  if (el) el.textContent = yen(total);
  // crypto の場合は円換算表示も更新
  if (isCrypto) {
    state[type].forEach((item, idx) => {
      const jpyEl = document.getElementById(`jpy-${type}-${idx}`);
      if (jpyEl) {
        const jpy = (+item.amount||0)*(prices[item.symbol]||150);
        jpyEl.textContent = `≈ ${yen(jpy)}（1${item.symbol||'USDT'} = ${yen(prices[item.symbol]||150)}）`;
      }
    });
  }
}
function delAsset(type, i) {
  state[type].splice(i,1);
  save();
}

// ── SUBSCRIPTION ──
function renderSub() {
  const mo = subMonthly();
  document.getElementById("sub-monthly").textContent = yen(mo);
  document.getElementById("sub-annual").textContent  = yen(mo*12) + " / 年";

  const ctx = document.getElementById("subChart");
  if (subChart) subChart.destroy();
  if (state.sub.length > 0) {
    subChart = new Chart(ctx, {
      type: "doughnut",
      data: {
        labels: state.sub.map(s=>s.name||"無名"),
        datasets: [{
          data: state.sub.map(s=>s.cycle==="year"?(+s.amount/12):(+s.amount||0)),
          backgroundColor: state.sub.map((_,i)=>SUB_COLORS[i%SUB_COLORS.length]),
          borderWidth:0, hoverOffset:8
        }]
      },
      options: { cutout:"65%", plugins:{ legend:{ labels:{ color:"#7a9488", font:{size:11}, padding:12, boxWidth:10 } } } }
    });
  }

  const listEl = document.getElementById("sub-list");
  listEl.innerHTML = state.sub.length === 0
    ? `<div class="empty-state">まだサブスクがありません<br>下のボタンから追加してください</div>`
    : state.sub.map((item,i)=>buildSubCard(item,i)).join("");
}

function buildSubCard(item, i) {
  const color = SUB_COLORS[i % SUB_COLORS.length];
  const moEq  = item.cycle==="year" ? `<div class="computed-jpy" style="margin-top:8px">月換算 ${yen(+item.amount/12)}</div>` : "";
  return `<div class="sub-card">
    <div class="sub-card-top">
      <div class="sub-dot" style="background:${color}"></div>
      <input class="name-input" type="text" placeholder="サービス名" value="${esc(item.name)}"
        oninput="updateSubName(${i},this.value)"
        onblur="saveOnly()">
      <button class="delete-btn" onclick="delSub(${i})">×</button>
    </div>
    <div class="sub-grid">
      <div class="sub-field">
        <label>金額</label>
        <div class="input-row" style="padding:9px 12px">
          <span class="input-prefix">¥</span>
          <input class="amount-input" type="number" inputmode="decimal" placeholder="0" value="${item.amount||''}"
            oninput="updateSubAmount(${i},this.value)"
            onblur="saveOnly()">
        </div>
      </div>
      <div class="sub-field">
        <label>サイクル</label>
        <select class="sub-cycle-sel" onchange="updateSub(${i},'cycle',this.value)">
          <option value="month"${item.cycle!=="year"?" selected":""}>月払い</option>
          <option value="year"${item.cycle==="year"?" selected":""}>年払い</option>
        </select>
      </div>
    </div>
    ${moEq}
  </div>`;
}

function addSub() { state.sub.push({name:"",amount:0,cycle:"month"}); save(); }
function updateSubName(i, val) { state.sub[i].name = val; }
function updateSubAmount(i, val) {
  state.sub[i].amount = +val;
  // 合計だけ部分更新
  const mo = subMonthly();
  document.getElementById("sub-monthly").textContent = yen(mo);
  document.getElementById("sub-annual").textContent  = yen(mo*12) + " / 年";
}
function updateSub(i,prop,val) { state.sub[i][prop]=prop==="amount"?+val:val; save(); }
function delSub(i) { state.sub.splice(i,1); save(); }

// ── Crypto prices ──
async function fetchPrices() {
  try {
    const ids = Object.values(CRYPTO_IDS).join(",");
    const res = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${ids}&vs_currencies=jpy`);
    const d = await res.json();
    const map = Object.fromEntries(Object.entries(CRYPTO_IDS).map(([sym,id])=>[sym, d[id]?.jpy||prices[sym]]));
    prices = { ...prices, ...map };
    render();
  } catch(e) { console.warn("Price fetch failed", e); }
}

// ── Init ──
fetchPrices();
renderHome();
setInterval(fetchPrices, 300000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
