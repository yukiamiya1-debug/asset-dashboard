<!DOCTYPE html>
<html lang="ja">
<head>

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Asset Dashboard</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Asset Dashboard" />
<link rel="apple-touch-icon" href="icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

html, body {
  background: #000;
  color: #fff;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
  overflow-x: hidden;
}

body {
  padding:
    calc(env(safe-area-inset-top) + 20px)
    20px
    calc(env(safe-area-inset-bottom) + 40px);
}

.container {
  max-width: 520px;
  margin: 0 auto;
  animation: fadeIn 0.6s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Header ── */
.header {
  margin-bottom: 28px;
}

.logo {
  font-size: 40px;
  font-weight: 700;
  color: #d4af37;
  margin-bottom: 8px;
  text-shadow: 0 0 20px rgba(212,175,55,0.35);
}

.sub {
  font-size: 12px;
  letter-spacing: 4px;
  color: #666;
}

/* ── Total Card ── */
.total-card {
  background: linear-gradient(145deg, rgba(22,22,22,0.96), rgba(8,8,8,0.96));
  border-radius: 30px;
  padding: 28px;
  margin-bottom: 26px;
  border: 1px solid rgba(212,175,55,0.18);
  box-shadow: 0 10px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.04);
  backdrop-filter: blur(20px);
}

.total-label {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
  letter-spacing: 1px;
}

.total-value {
  font-size: 42px;
  font-weight: 700;
}

/* ── Chart ── */
.chart-wrap {
  background: #0c0c0c;
  border-radius: 28px;
  padding: 20px;
  margin-bottom: 26px;
  border: 1px solid rgba(255,255,255,0.05);
}

/* ── Accordion Section ── */
.section {
  margin-bottom: 14px;
  border-radius: 24px;
  overflow: hidden;
  border: 1px solid rgba(255,255,255,0.06);
  background: linear-gradient(145deg, rgba(20,20,20,0.96), rgba(8,8,8,0.96));
  box-shadow: 0 4px 20px rgba(0,0,0,0.35);
}

/* ── Accordion Header (tap target) ── */
.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 18px 20px;
  cursor: pointer;
  user-select: none;
  transition: background 0.2s;
}

.section-header:active {
  background: rgba(212,175,55,0.06);
}

.section-header-left {
  display: flex;
  align-items: center;
  gap: 10px;
}

.section-title {
  font-size: 15px;
  font-weight: 700;
  color: #d4af37;
  letter-spacing: 1px;
}

.section-total {
  font-size: 17px;
  font-weight: 700;
  color: #fff;
}

.chevron {
  font-size: 13px;
  color: #555;
  transition: transform 0.3s ease;
}

.section.open .chevron {
  transform: rotate(180deg);
}

/* ── Accordion Body ── */
.section-body {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.section.open .section-body {
  max-height: 2000px;
}

.section-body-inner {
  padding: 0 14px 18px;
}

/* ── Card ── */
.card {
  background: rgba(255,255,255,0.03);
  border-radius: 18px;
  padding: 16px;
  margin-bottom: 12px;
  border: 1px solid rgba(255,255,255,0.05);
}

.name-input {
  width: 100%;
  background: #111;
  border: none;
  border-radius: 14px;
  padding: 12px;
  color: #fff;
  font-size: 16px;
  font-weight: 600;
  outline: none;
  margin-bottom: 12px;
}

.input {
  width: 100%;
  background: #111;
  border: none;
  border-radius: 14px;
  padding: 14px;
  color: #fff;
  font-size: 16px;
  outline: none;
}

.input:focus,
.name-input:focus {
  border: 1px solid rgba(212,175,55,0.5);
}

.row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 12px;
}

.value {
  font-size: 18px;
  font-weight: 700;
}

.crypto-main {
  font-size: 24px;
  font-weight: 700;
  color: #d4af37;
}

.crypto-jpy {
  font-size: 14px;
  color: #888;
  margin-top: 4px;
}

/* ── Add Button ── */
.add-btn {
  width: 100%;
  border: none;
  border-radius: 18px;
  padding: 16px;
  margin-top: 6px;
  font-size: 16px;
  font-weight: 700;
  background: rgba(212,175,55,0.12);
  color: #d4af37;
  border: 1px solid rgba(212,175,55,0.25);
  cursor: pointer;
  transition: 0.2s;
  letter-spacing: 1px;
}

.add-btn:active {
  transform: scale(0.98);
  background: rgba(212,175,55,0.2);
}

.footer-space { height: 60px; }

</style>
</head>
<body>

<div class="container">

  <div class="header">
    <div class="logo">¥</div>
    <div class="sub">ASSET DASHBOARD</div>
  </div>

  <div class="total-card">
    <div class="total-label">TOTAL ASSETS</div>
    <div class="total-value" id="totalAssets">¥0</div>
  </div>

  <div class="chart-wrap">
    <canvas id="assetChart"></canvas>
  </div>

  <div id="app"></div>

  <div class="footer-space"></div>

</div>

<script>

const STORAGE_KEY = "asset-dashboard-data";

let state = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
  bank: [],
  stock: [],
  crypto: []
};

// アコーディオン開閉状態（セッション中保持）
let openSections = { bank: false, stock: false, crypto: false };

let usdtPrice = 150;

async function fetchUSDTPrice() {
  try {
    const res = await fetch(
      "https://api.coingecko.com/api/v3/simple/price?ids=tether&vs_currencies=jpy"
    );
    const data = await res.json();
    usdtPrice = data.tether.jpy || 150;
    render();
  } catch(e) {
    console.log(e);
  }
}

function saveLocal() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  updateTotal();
  updateChart();
  updateSectionTotals();
}

function formatYen(num) {
  return "¥" + Number(num).toLocaleString("ja-JP");
}

function getSectionTotal(key, isCrypto) {
  return state[key].reduce((a, b) => {
    return a + Number(isCrypto ? b.amount * usdtPrice : b.amount);
  }, 0);
}

function createSection(title, key, isCrypto = false) {
  const total = getSectionTotal(key, isCrypto);
  const isOpen = openSections[key];

  const cards = state[key].map((item, index) => {
    const jpy = isCrypto ? Math.round(item.amount * usdtPrice) : item.amount;
    return `
      <div class="card">
        <input
          class="name-input"
          type="text"
          placeholder="名称入力"
          value="${item.name}"
          oninput="updateName('${key}',${index},this.value)"
        >
        <div class="row">
          <div>
            ${isCrypto ? `
              <div class="crypto-main">${item.amount} USDT</div>
              <div class="crypto-jpy">≈ ${formatYen(jpy)}</div>
            ` : `
              <div class="value">${formatYen(item.amount)}</div>
            `}
          </div>
        </div>
        <input
          class="input"
          type="number"
          inputmode="decimal"
          placeholder="金額入力"
          value="${item.amount || ''}"
          oninput="updateField('${key}',${index},this.value)"
        >
      </div>
    `;
  }).join("");

  return `
    <div class="section${isOpen ? ' open' : ''}" id="section-${key}">
      <div class="section-header" onclick="toggleSection('${key}')">
        <div class="section-header-left">
          <span class="section-title">${title}</span>
          <span class="section-total" id="section-total-${key}">${formatYen(Math.round(total))}</span>
        </div>
        <span class="chevron">▼</span>
      </div>
      <div class="section-body">
        <div class="section-body-inner">
          ${cards}
          <button class="add-btn" onclick="addAsset('${key}')">＋ 追加</button>
        </div>
      </div>
    </div>
  `;
}

function toggleSection(key) {
  openSections[key] = !openSections[key];
  const el = document.getElementById(`section-${key}`);
  if (el) {
    el.classList.toggle('open', openSections[key]);
  }
}

function updateSectionTotals() {
  const keys = [
    { key: 'bank',   crypto: false },
    { key: 'stock',  crypto: false },
    { key: 'crypto', crypto: true  }
  ];
  keys.forEach(({ key, crypto }) => {
    const el = document.getElementById(`section-total-${key}`);
    if (el) {
      const total = getSectionTotal(key, crypto);
      el.textContent = formatYen(Math.round(total));
    }
  });
}

function updateName(type, index, value) {
  state[type][index].name = value;
  saveLocal();
}

function updateField(type, index, value) {
  state[type][index].amount = Number(value);
  saveLocal();
}

function addAsset(type) {
  state[type].push({ name: "", amount: 0 });
  saveLocal();
  render();
  // 追加後も開いた状態を維持
  openSections[type] = true;
  const el = document.getElementById(`section-${type}`);
  if (el) el.classList.add('open');
}

function updateTotal() {
  let total = 0;
  state.bank.forEach(i   => { total += Number(i.amount); });
  state.stock.forEach(i  => { total += Number(i.amount); });
  state.crypto.forEach(i => { total += Number(i.amount * usdtPrice); });
  document.getElementById("totalAssets").innerText = formatYen(Math.round(total));
}

let chart;

function updateChart() {
  const bank   = state.bank.reduce((a,b)  => a + Number(b.amount), 0);
  const stock  = state.stock.reduce((a,b) => a + Number(b.amount), 0);
  const crypto = state.crypto.reduce((a,b)=> a + Number(b.amount * usdtPrice), 0);

  const ctx = document.getElementById("assetChart");
  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "doughnut",
    data: {
      labels: ["Bank", "Stock", "Crypto"],
      datasets: [{
        data: [bank, stock, crypto],
        backgroundColor: ["#d4af37", "#777", "#2a2a2a"],
        borderWidth: 0
      }]
    },
    options: {
      plugins: {
        legend: {
          labels: { color: "#999" }
        }
      }
    }
  });
}

function render() {
  document.getElementById("app").innerHTML =
    createSection("BANK",   "bank")   +
    createSection("STOCK",  "stock")  +
    createSection("CRYPTO", "crypto", true);

  updateTotal();
  updateChart();
}

fetchUSDTPrice();
render();
setInterval(fetchUSDTPrice, 300000);

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}

</script>
</body>
</html>
